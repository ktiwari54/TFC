<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Films | TFC Films & CO. — Tales From the Culture</title>
  <meta name="description" content="Browse every cinematic tale from TFC Films & CO. — dreamlike wedding films rooted in culture and celebration.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Lobster&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/sidebar-magic.css">
  <link rel="stylesheet" href="css/theme-contrast.css">
  <link rel="stylesheet" href="css/films-magic.css">
</head>
<body class="inner-page films-page-magic" data-page="films" data-base="">
  <div id="site-header"></div>

  <section class="dream-films-page" id="all-films">
    <div class="dream-films-aurora" aria-hidden="true"></div>
    <div class="dream-films-merge dream-films-merge--top" aria-hidden="true"></div>

    <div class="dream-films-floaters" aria-hidden="true">
      <span class="dream-float dream-float--1">✦</span>
      <span class="dream-float dream-float--2">♥</span>
      <span class="dream-float dream-float--3">✧</span>
      <span class="dream-float dream-float--4">✦</span>
      <span class="dream-float dream-float--5">❋</span>
      <span class="dream-float dream-float--6">✧</span>
    </div>

    <div class="dream-films-stage">
      <header class="dream-films-header">
        <p class="dream-kicker">✦ Every tale we've told ✦</p>
        <h1 class="dream-title">All <em>Cinematic</em> Films</h1>
        <p class="dream-sub">A gallery of celebrations — each poster a fairytale framed through our lens.</p>
      </header>

      <div class="dream-films-toolbar">
        <form class="dream-films-search" role="search" onsubmit="return false;">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8.5" cy="8.5" r="5.5"/><path d="M13 13l4 4"/></svg>
          <input type="search" id="filmsSearch" placeholder="Search a couple or film..." aria-label="Search films">
        </form>

        <p class="dream-films-count" id="filmsCount">Loading films...</p>

        <div class="dream-tabs-wrap">
          <div class="films-filter film-tabs" id="filmsFilter">
            <button class="film-tab active" data-filter="all">All Tales</button>
            <button class="film-tab" data-filter="recents">Recents</button>
            <button class="film-tab" data-filter="favourites">Favourites</button>
            <button class="film-tab" data-filter="classics">Classics</button>
            <button class="film-tab" data-filter="celebrities">Celebrities</button>
            <button class="film-tab" data-filter="international">International</button>
          </div>
        </div>
      </div>

      <div class="dream-films-grid" id="allFilmsGrid"></div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="js/films-data.js"></script>
  <script src="js/films-images.js"></script>
  <script src="js/trailer-data.js"></script>
  <script src="js/layout.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <script src="js/scroll-effects.js"></script>
  <script src="js/film-previews.js"></script>
  <script src="js/crew-bts.js"></script>
  <script src="js/films-magic.js"></script>
  <script src="js/films-page.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
