<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 88" role="img" aria-label="TFC Films and CO. — Tales From the Culture">
  <defs>
    <linearGradient id="wm-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a4a8a"/>
      <stop offset="100%" stop-color="#7b5ea7"/>
    </linearGradient>
    <linearGradient id="wm-gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8c872"/>
      <stop offset="100%" stop-color="#f4d88a"/>
    </linearGradient>
  </defs>

  <!-- Icon (scaled from mark) -->
  <g transform="translate(4, 4) scale(0.67)">
    <circle cx="60" cy="60" r="56" fill="url(#wm-bg)"/>
    <circle cx="60" cy="60" r="54" fill="none" stroke="url(#wm-gold)" stroke-width="2.2" opacity="0.85"/>
    <path d="M22 68 C38 42, 82 42, 98 68" fill="none" stroke="url(#wm-gold)" stroke-width="2" opacity="0.7"/>
    <path d="M36 86 C46 80, 54 78, 60 78 C66 78, 74 80, 84 86 L60 98 Z" fill="#f8f4ef" opacity="0.95"/>
    <path d="M36 86 L60 78 L60 98 Z" fill="#c9b896" opacity="0.35"/>
    <text x="60" y="62" text-anchor="middle"
      font-family="'Cormorant Garamond', Georgia, serif"
      font-size="26" font-weight="600" fill="url(#wm-gold)" letter-spacing="3">TFC</text>
  </g>

  <!-- Wordmark -->
  <text x="98" y="38"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="28" font-weight="600" fill="#f8f4ef" letter-spacing="0.5">TFC Films &amp; CO.</text>
  <text x="98" y="62"
    font-family="'DM Sans', 'Segoe UI', sans-serif"
    font-size="11.5" font-weight="500" fill="url(#wm-gold)" letter-spacing="0.28em" text-transform="uppercase">Tales From the Culture</text>

  <!-- Decorative thread line -->
  <path d="M98 72 H400" stroke="#f4d88a" stroke-width="1" opacity="0.35"/>
  <circle cx="98" cy="72" r="2.5" fill="#f4d88a" opacity="0.6"/>
</svg>