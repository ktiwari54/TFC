<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="TFC — Tales From the Culture">
  <defs>
    <linearGradient id="tfc-bg" x1="12" y1="8" x2="108" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a2f5c"/>
      <stop offset="45%" stop-color="#2a4a8a"/>
      <stop offset="100%" stop-color="#7b5ea7"/>
    </linearGradient>
    <linearGradient id="tfc-gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8c872"/>
      <stop offset="50%" stop-color="#f4d88a"/>
      <stop offset="100%" stop-color="#e8c872"/>
    </linearGradient>
    <radialGradient id="tfc-glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#f4d88a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f4d88a" stop-opacity="0"/>
    </radialGradient>
    <filter id="tfc-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Badge -->
  <circle cx="60" cy="60" r="56" fill="url(#tfc-bg)"/>
  <circle cx="60" cy="60" r="56" fill="url(#tfc-glow)"/>
  <circle cx="60" cy="60" r="54" fill="none" stroke="url(#tfc-gold)" stroke-width="2.2" opacity="0.85"/>
  <circle cx="60" cy="60" r="48" fill="none" stroke="#f4d88a" stroke-width="0.6" opacity="0.25"/>

  <!-- Interwoven culture threads -->
  <g fill="none" stroke="url(#tfc-gold)" stroke-linecap="round" opacity="0.75">
    <path d="M22 68 C38 42, 82 42, 98 68" stroke-width="2"/>
    <path d="M18 76 C40 48, 80 48, 102 76" stroke-width="1.4" opacity="0.55"/>
    <path d="M26 60 C44 36, 76 36, 94 60" stroke-width="1.2" opacity="0.45"/>
  </g>

  <!-- Open storybook (tales) -->
  <g filter="url(#tfc-soft)">
    <path d="M36 86 C46 80, 54 78, 60 78 C66 78, 74 80, 84 86 L60 98 Z" fill="#f8f4ef" opacity="0.95"/>
    <path d="M36 86 L60 78 L60 98 Z" fill="#c9b896" opacity="0.35"/>
    <path d="M60 78 L84 86 L60 98 Z" fill="#e8dfd4" opacity="0.5"/>
    <path d="M60 78 L60 98" stroke="#b8a67a" stroke-width="0.8" opacity="0.6"/>
    <path d="M42 84 C50 81, 55 80, 60 80" stroke="#e8c872" stroke-width="0.7" fill="none" opacity="0.5"/>
    <path d="M78 84 C70 81, 65 80, 60 80" stroke="#e8c872" stroke-width="0.7" fill="none" opacity="0.5"/>
  </g>

  <!-- Cinematic arc / lens flare -->
  <path d="M34 44 Q60 28, 86 44" fill="none" stroke="#f4d88a" stroke-width="1.5" opacity="0.5"/>
  <circle cx="60" cy="34" r="3" fill="#f4d88a" opacity="0.8"/>
  <circle cx="60" cy="34" r="6" fill="#f4d88a" opacity="0.15"/>

  <!-- TFC monogram -->
  <text x="60" y="62" text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
    font-size="26" font-weight="600" fill="url(#tfc-gold)" letter-spacing="3">TFC</text>

  <!-- Sparkle accents -->
  <g fill="#f4d88a">
    <path d="M88 26 L89.2 29.5 L92.5 30.2 L89.8 32.5 L90.5 36 L88 34 L85.5 36 L86.2 32.5 L83.5 30.2 L86.8 29.5 Z" opacity="0.9"/>
    <circle cx="28" cy="38" r="1.5" opacity="0.7"/>
    <circle cx="94" cy="52" r="1.2" opacity="0.55"/>
  </g>
</svg>